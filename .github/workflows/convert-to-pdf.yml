name: Konvertuj MD u PDF

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Prikazi fajlove
        run: ls -la

      - name: Instaliraj Pandoc i LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-extra texlive-fonts-extra fonts-dejavu

      - name: Konvertuj u PDF
        run: |
          pandoc -f markdown-yaml_metadata_block \
            "specifikacija.md" \
            -o "specifikacija.pdf" \
            --pdf-engine=xelatex \
            -H header.tex \
            --wrap=auto \
            -V documentclass=article \
            -V papersize=a4 \
            -V fontsize=11pt \
            -V geometry:margin=2cm \
            -V lang=bs

      - name: Uploaduj PDF
        uses: actions/upload-artifact@v4
        with:
          name: specifikacija-pdf
          path: specifikacija.pdf
