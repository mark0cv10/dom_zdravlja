name: Konvertuj MD u PDF

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Prikazi fajlove
        run: ls -la

      - name: Instaliraj Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Konvertuj u PDF
        run: |
          pandoc -f markdown-yaml_metadata_block "specifikacija.md" -o "specifikacija.pdf" --pdf-engine=xelatex -V geometry:margin=1in

      - name: Uploaduj PDF
        uses: actions/upload-artifact@v4
        with:
          name: specifikacija-pdf
          path: specifikacija.pdf
